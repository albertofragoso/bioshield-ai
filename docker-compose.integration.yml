# docker-compose.integration.yml
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bioshield
      POSTGRES_PASSWORD: bioshield
      POSTGRES_DB: bioshield
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioshield -d bioshield"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bioshield:bioshield@postgres:5432/bioshield
      CHROMA_PERSIST_DIRECTORY: /data/chroma_db
      ENVIRONMENT: test
      RATE_LIMIT_ENABLED: "false"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AES_KEY: ${AES_KEY:-integration-test-key-32-bytes-ok}
      JWT_SECRET: integration-test-jwt-secret-2026
      USE_LOCAL_EMBEDDINGS: "false"
      DEBUG: "true"
    volumes:
      - ./tests/fixtures/chroma-seed:/data/chroma_db:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes: {}
