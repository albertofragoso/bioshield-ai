services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bioshield
      POSTGRES_PASSWORD: bioshield
      POSTGRES_DB: bioshield
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioshield -d bioshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://bioshield:bioshield@postgres:5432/bioshield
      CHROMA_PERSIST_DIRECTORY: /data/chroma_db
    volumes:
      - chroma_data:/data/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations then start server
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
